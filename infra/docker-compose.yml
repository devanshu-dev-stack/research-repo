# One-command local stack: Postgres+pgvector, Redis, MinIO, web, worker.
# Usage (from repo root): docker compose -f infra/docker-compose.yml up --build
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_repo
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket once MinIO is up, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio: { condition: service_started }
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/research-repo || true &&
      echo 'bucket ready'
      "

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/research_repo?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: research-repo
      S3_REGION: auto
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      EMBED_DIM: ${EMBED_DIM:-3072}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    ports: ["3000:3000"]

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/research_repo?schema=public
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: research-repo
      S3_REGION: auto
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      EMBED_PROVIDER: ${EMBED_PROVIDER:-local}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      EMBED_DIM: ${EMBED_DIM:-3072}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production

volumes:
  pgdata:
  miniodata:
